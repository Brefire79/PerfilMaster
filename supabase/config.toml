[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://profileai.netlify.app"]
jwt_expiry = 3600
enable_signup = true

[functions.analyzeResponse]
verify_jwt = true

[functions.buildProfile]
verify_jwt = true

[functions.groupInsights]
verify_jwt = true

[functions.therapyFlag]
verify_jwt = true

[functions.buscarPorToken]
verify_jwt = false

[functions.atualizarStatus]
verify_jwt = false

# Convite: o colega deslogado valida o token ao abrir /register — precisa ser público
[functions.validateInviteToken]
verify_jwt = false

# insightPerfil é chamado pelo ResultadoPublico (avaliado sem login)
[functions.insightPerfil]
verify_jwt = false

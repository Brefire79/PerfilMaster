<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="ProfileAI — Assessment comportamental DISC + Sabotadores para desenvolvimento pessoal e mentoria corporativa. AMB FUSI." />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ProfileAI" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="ProfileAI — AMB FUSI" />
    <meta property="og:description" content="Descubra seu perfil comportamental e potencialize seu desenvolvimento." />
    <meta property="og:type" content="website" />

    <title>ProfileAI — AMB FUSI</title>

    <style>
      /* Splash screen enquanto o React carrega */
      #splash {
        position: fixed;
        inset: 0;
        background: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-logo {
        font-size: 2.5rem;
        font-weight: 800;
        color: #6366f1;
        letter-spacing: -1px;
        margin-bottom: 0.5rem;
      }
      #splash-sub {
        font-size: 0.85rem;
        color: #64748b;
        font-family: sans-serif;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      #splash-spinner {
        margin-top: 2rem;
        width: 32px;
        height: 32px;
        border: 3px solid #1e293b;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      body { margin: 0; background: #0f172a; }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <div id="splash-logo">ProfileAI</div>
      <div id="splash-sub">AMB FUSI · Damos vida à inovação</div>
      <div id="splash-spinner"></div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Remove splash quando o app React estiver pronto
      window.__hideSplash = function () {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 450);
        }
      };
    </script>
  </body>
</html>
